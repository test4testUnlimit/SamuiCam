<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera View Builder — Koh Samui</title>
    <style>
        /* ── Design tokens ── */
        :root {
            --bg:   #111;
            --bg2:  #1a1a1a;
            --bg3:  #222;
            --bd:   #2a2a2a;
            --t1:   #ddd;
            --t2:   #888;
            --t3:   #444;
            --ac:   #4fc;
        }
        [data-theme="light"] {
            --bg:   #f0f0f0;
            --bg2:  #fff;
            --bg3:  #e8e8e8;
            --bd:   #ddd;
            --t1:   #111;
            --t2:   #555;
            --t3:   #aaa;
            --ac:   #0d6efd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--t1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            padding: 13px 20px 11px 56px;
            border-bottom: 1px solid var(--bd);
            flex-shrink: 0;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        header h1 { font-size: 15px; font-weight: 500; color: var(--t1); }
        header p  { font-size: 12px; color: var(--t2); }

        /* ── Two-column layout ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left: camera grid ── */
        .cam-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            scrollbar-width: none;       /* Firefox */
            -ms-overflow-style: none;    /* IE/Edge legacy */
        }
        .cam-area::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Each geo group is its own section */
        .group h2 {
            font-size: 11px;
            font-weight: 400;
            color: var(--t2);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bd);
            margin-bottom: 12px;
        }
        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        /* ── Camera card ── */
        .card {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            background: #000;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        }
        .card:hover {
            border-color: var(--bd);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .card.on {
            border-color: var(--ac);
        }

        /* img on a replaced element: aspect-ratio works perfectly here */
        .card img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .card-name {
            padding: 7px 10px 8px;
            font-size: 12px;
            color: var(--t2);
            background: var(--bg2);
            line-height: 1.35;
            transition: color 0.15s;
            height: 48px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .card.on .card-name { color: var(--t1); }

        /* ── Right: sidebar ── */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            border-left: 1px solid var(--bd);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .sidebar-footer {
            border-top: 1px solid var(--bd);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        /* Section label */
        .lbl {
            font-size: 10px;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 7px;
        }

        /* Mode toggle */
        .mode-row {
            display: flex;
            border: 1px solid var(--bd);
            border-radius: 5px;
            overflow: hidden;
        }
        .mode-row button {
            flex: 1;
            padding: 8px 6px;
            background: none;
            border: none;
            color: var(--t2);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            line-height: 1.4;
            text-align: center;
            transition: background 0.15s, color 0.15s;
        }
        .mode-row button small { display: block; font-size: 10px; color: var(--t3); }
        .mode-row button.on { background: var(--bg3); color: var(--ac); }

        /* Selected list */
        .sel-empty { font-size: 12px; color: var(--t3); padding: 4px 0; }
        .sel-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            border-bottom: 1px solid var(--bd);
        }
        .sel-item:last-child { border-bottom: none; }
        .sel-num  { font-size: 11px; color: var(--t3); width: 16px; flex-shrink: 0; }
        .sel-name { flex: 1; font-size: 12px; color: var(--t2); line-height: 1.3; }
        .sel-mv   { background: none; border: 1px solid var(--bd); color: var(--t3); font-size: 11px;
                    cursor: pointer; padding: 2px 6px; border-radius: 3px; font-family: inherit;
                    transition: all 0.15s; }
        .sel-mv:hover:not(:disabled) { border-color: var(--t2); color: var(--t1); }
        .sel-mv:disabled { opacity: 0.2; cursor: default; }
        .sel-rm   { color: var(--t3); cursor: pointer; font-size: 18px; line-height: 1;
                    padding: 0 2px; transition: color 0.12s; flex-shrink: 0; }
        .sel-rm:hover { color: #f55; }

        /* URL display */
        .url-box {
            font-family: 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            color: var(--ac);
            background: var(--bg2);
            border: 1px solid var(--bd);
            border-radius: 4px;
            padding: 8px 10px;
            word-break: break-all;
            line-height: 1.55;
            min-height: 44px;
        }

        /* Buttons */
        .btn-p {
            width: 100%; padding: 11px; border: none; border-radius: 5px;
            background: var(--ac); color: #000; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: filter 0.15s;
        }
        .btn-p:hover { filter: brightness(1.1); }
        .btn-p:disabled { opacity: 0.3; cursor: default; filter: none; }
        .btn-s {
            width: 100%; padding: 10px; border: 1px solid var(--bd); border-radius: 5px;
            background: none; color: var(--t2); font-size: 13px;
            cursor: pointer; font-family: inherit; transition: all 0.15s;
        }
        .btn-s:hover { color: var(--t1); border-color: var(--t2); }
        .copy-ok { font-size: 11px; color: var(--ac); text-align: center; height: 14px; }

        /* ── Playback options ── */
        .play-opts { display: flex; flex-direction: column; gap: 9px; }
        .play-row  { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--t2); }
        .play-row input[type="checkbox"] { accent-color: var(--ac); cursor: pointer; width: 13px; height: 13px; }
        .play-num  { width: 42px; padding: 3px 4px; background: var(--bg2); border: 1px solid var(--bd);
                     border-radius: 3px; color: var(--t1); font-size: 12px; font-family: inherit; text-align: center; }
        .play-num:focus { outline: 1px solid var(--ac); border-color: var(--ac); }

        /* ── Hamburger ── */
        .hamburger {
            position: fixed; top: 13px; left: 14px; z-index: 200;
            cursor: pointer; font-size: 15px; color: var(--t1);
            background: var(--bg2); border: 1px solid var(--bd);
            padding: 5px 9px; border-radius: 5px;
            opacity: 0.5; transition: opacity 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .hamburger:hover { opacity: 1; }

        /* ── Side menu ── */
        .menu-bg {
            display: none;
            position: fixed; top: 0; right: 0; bottom: 0; left: 0; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 201;
        }
        .menu-bg.open { display: block; }
        .side-menu {
            position: fixed; top: 0; left: 0; width: 240px; height: 100%;
            background: var(--bg2); border-right: 1px solid var(--bd);
            z-index: 202;
            transform: translateX(-100%);
            transition: transform 0.28s ease;
            display: flex; flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-hd   { color: var(--t3); font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
                     padding: 0 18px 12px; border-bottom: 1px solid var(--bd); margin-bottom: 6px; }
        .menu-a    { display: block; color: var(--t2); text-decoration: none; padding: 12px 18px;
                     font-size: 14px; transition: background 0.15s, color 0.15s; }
        .menu-a:hover { background: var(--bg3); color: var(--t1); }
        .menu-a.on { color: var(--ac); border-left: 3px solid var(--ac); padding-left: 15px; }
        .menu-sep  { border: none; border-top: 1px solid var(--bd); margin: 4px 0; }
        .menu-th   { display: flex; align-items: center; justify-content: space-between;
                     padding: 11px 18px; cursor: pointer; transition: background 0.15s; }
        .menu-th:hover { background: var(--bg3); }
        .menu-th span { color: var(--t2); font-size: 13px; }
        .menu-tip  { margin-top: auto; padding: 12px 18px 6px; color: var(--t2); font-size: 11px;
                     border-top: 1px solid var(--bd); line-height: 1.5; }
        .menu-ver  { padding: 4px 18px 12px; color: var(--t3); font-size: 11px;
                     font-family: 'Cascadia Code','Consolas','Monaco','Menlo',monospace;
                     text-align: right; }

        /* ── Mobile ── */
        @media (max-width: 700px) {
            body { height: auto; overflow: auto; }
            .layout { flex-direction: column; overflow: visible; }
            .cam-area  { overflow-y: visible; }
            .sidebar   { width: 100%; border-left: none; border-top: 1px solid var(--bd); }
            .sidebar-body { overflow-y: visible; }
        }
    </style>
</head>
<body>

<!-- Nav -->
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="menu-bg" id="menuBg" onclick="toggleMenu()"></div>
<nav class="side-menu" id="sideMenu">
    <div class="menu-hd">Navigation</div>
    <a href="/"         class="menu-a">🏠 &nbsp;Home</a>
    <a href="/builder/" class="menu-a on">🎨 &nbsp;Build a View</a>
    <hr class="menu-sep">
    <div class="menu-th" onclick="toggleTheme()">
        <span>Theme</span>
        <span id="themeIcon">☀</span>
    </div>
    <hr class="menu-sep">
    <div class="menu-tip">💡 Copy a link → paste into Wallpaper Engine, or open fullscreen with F11</div>
    <div class="menu-ver">v.1.022</div>
</nav>

<!-- Header -->
<header>
    <h1>Camera View Builder</h1>
    <p>Pick cameras · set order · copy link</p>
</header>

<!-- Main -->
<div class="layout">

    <!-- Left: camera cards -->
    <div class="cam-area" id="camArea"></div>

    <!-- Right: sidebar -->
    <div class="sidebar">
        <div class="sidebar-body">

            <div>
                <div class="lbl">Mode</div>
                <div class="mode-row">
                    <button id="btnContain" onclick="setMode('contain')">
                        Contain <small>bars, no crop</small>
                    </button>
                    <button id="btnFill" class="on" onclick="setMode('fill')">
                        Fill <small>fills screen</small>
                    </button>
                </div>
            </div>

            <div>
                <div class="lbl">Selected — <span id="selCount">0</span></div>
                <div id="selList"><div class="sel-empty">Click a camera to add it</div></div>
            </div>

            <div>
                <div class="lbl">Playback</div>
                <div class="play-opts">
                    <label class="play-row">
                        <input type="checkbox" id="chkRandom" onchange="updatePlay()">
                        <span>🔀 Random order on load</span>
                    </label>
                    <label class="play-row">
                        <input type="checkbox" id="chkRotate" onchange="updatePlay()">
                        <span>🔄 Rotate every</span>
                        <input type="number" id="rotateMin" value="10" min="1" max="999" class="play-num" oninput="updatePlay()">
                        <span>min</span>
                    </label>
                    <div class="play-row" id="showRow" style="display:none;padding-left:19px">
                        <span>show</span>
                        <input type="number" id="showN" value="1" min="1" max="20" class="play-num" oninput="updatePlay()">
                        <span style="color:var(--t3)">at a time</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="lbl">Link</div>
                <div class="url-box" id="urlBox">—</div>
            </div>

        </div>
        <div class="sidebar-footer">
            <button class="btn-p" id="copyBtn" onclick="copyUrl()" disabled>Copy Link</button>
            <div class="copy-ok" id="copyOk"></div>
            <button class="btn-s" onclick="openPreview()">Open Preview ↗</button>
        </div>
    </div>

</div>

<script>
    /* ── Stream data ── */
    const GROUPS = [
        {
            label: "🇹🇭 Koh Samui · Thailand",
            cams: [
                { id: "3N3ZwIB_X4Y", name: "Crystal Bay Yacht Club, Lamai" },
                { id: "Fw9hgttWzIg", name: "Crystal Bay Beach Resort, Lamai" },
                { id: "Tpj0cmMVOd0", name: "Baobab Cam, Lamai" },
                { id: "UJpFtzKug7M", name: "Royal Muang Samui Villas, Choeng Mon" },
                { id: "Kush_ZxTy2c", name: "Black Pearl, Lamai" },
                { id: "LGNYKz4yziE", name: "Crystal Bay Yacht Club — Panoramic" },
                { id: "NTTtqzL5OWI", name: "Crystal Bay Beach Resort — Panoramic" },
                { id: "FBYUkqutqzE", name: "House of Sanskara, Koh Phangan" },
                { id: "x73IEW0fOo0", name: "Floating Lotus · Big Buddha, Koh Samui" },
                { id: "wP6hpWgPJ98", name: "Banyan Tree Samui" },
                { id: "Sm9y8G0TLXI", name: "No Stress Restaurant, Lamai" },
            ]
        },
        {
            label: "🇸🇨 Seychelles",
            cams: [
                { id: "Thtj8Ht7Z_c", name: "Seychelles Ocean 4K" },
            ]
        },
        {
            label: "🇲🇻 Maldives",
            cams: [
                { id: "pn3lAmLSva0", name: "Maamunagau Island, Maldives" },
                { id: "Mu0dzKm5ZaE", name: "Paradise Found, Maldives" },
                { id: "XrLz_hOBCT8", name: "Indian Ocean 4K" },
                { id: "_BMi3usEwi8", name: "InterContinental Resort, Maldives" },
            ]
        },
        {
            label: "🇺🇸 Hawaii",
            cams: [
                { id: "X0idnu7HUmI", name: "Sheraton Waikiki, Oahu" },
                { id: "YcEf_y0Ct14", name: "Napili Sunset Resort, Maui" },
            ]
        },
        {
            label: "🌴 Caribbean",
            cams: [
                { id: "vxHKAImxUHk", name: "Simpson Bay Beach, Saint Martin" },
            ]
        },
        {
            label: "🇵🇭 Philippines",
            cams: [
                { id: "UDAZWxehMAI", name: "Mayon Volcano, Philippines" },
            ]
        },
        {
            label: "🇨🇭 Europe · Alps",
            cams: [
                { id: "enYFXf8u7Lc", name: "Swiss Alps Panorama" },
            ]
        },
        {
            label: "🛸 Space",
            cams: [
                { id: "vytmBNhc9ig", name: "NASA ISS — Earth from Space" },
            ]
        }
    ];

    const ALL_CAMS = GROUPS.flatMap(g => g.cams);

    let selected = [];   /* array of cam IDs in chosen order */
    let mode       = 'fill';
    let playRandom = false;
    let playRotate = 0;
    let playShow   = 0;

    function updatePlay() {
        playRandom = document.getElementById('chkRandom').checked;
        const rotOn = document.getElementById('chkRotate').checked;
        playRotate  = rotOn ? (parseInt(document.getElementById('rotateMin').value) || 10) : 0;
        playShow    = rotOn ? (parseInt(document.getElementById('showN').value)    || 0)  : 0;
        document.getElementById('showRow').style.display = rotOn ? '' : 'none';
        renderSidebar();
    }

    /* ── Render camera grid ── */
    function renderGrid() {
        const area = document.getElementById('camArea');
        area.innerHTML = '';

        GROUPS.forEach(g => {
            const section = document.createElement('section');
            section.className = 'group';

            const h2 = document.createElement('h2');
            h2.textContent = g.label;
            section.appendChild(h2);

            const grid = document.createElement('div');
            grid.className = 'group-grid';

            g.cams.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card' + (selected.includes(c.id) ? ' on' : '');
                card.onclick = () => toggle(c.id);

                const img = document.createElement('img');
                img.src  = `https://img.youtube.com/vi/${c.id}/mqdefault.jpg`;
                img.alt  = c.name;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.onerror = null;
                    this.src = `https://img.youtube.com/vi/${c.id}/hqdefault.jpg`;
                };

                const name = document.createElement('div');
                name.className = 'card-name';
                name.textContent = c.name;

                card.appendChild(img);
                card.appendChild(name);
                grid.appendChild(card);
            });

            section.appendChild(grid);
            area.appendChild(section);
        });
    }

    /* ── Render sidebar ── */
    function renderSidebar() {
        document.getElementById('selCount').textContent = selected.length;
        const list = document.getElementById('selList');

        if (!selected.length) {
            list.innerHTML = '<div class="sel-empty">Click a camera to add it</div>';
        } else {
            list.innerHTML = selected.map((id, i) => {
                const cam  = ALL_CAMS.find(c => c.id === id);
                const name = cam ? cam.name : id;
                const last = i === selected.length - 1;
                return `<div class="sel-item">
                    <span class="sel-num">${i + 1}</span>
                    <span class="sel-name">${name}</span>
                    <button class="sel-mv" onclick="move(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
                    <button class="sel-mv" onclick="move(${i}, 1)" ${last  ? 'disabled' : ''}>↓</button>
                    <span class="sel-rm" onclick="toggle('${id}')">×</span>
                </div>`;
            }).join('');
        }

        const url = buildUrl();
        document.getElementById('urlBox').textContent = url || '—';
        document.getElementById('copyBtn').disabled   = !url;
    }

    /* ── Actions ── */
    function buildUrl() {
        if (!selected.length) return '';
        let url = `${location.origin}/view/?cams=${selected.join(',')}&mode=${mode}`;
        if (playRandom) url += '&random=1';
        if (playRotate > 0) {
            url += `&rotate=${playRotate}`;
            if (playShow > 0 && playShow < selected.length) url += `&show=${playShow}`;
        }
        return url;
    }

    function toggle(id) {
        const i = selected.indexOf(id);
        if (i === -1) selected.push(id);
        else selected.splice(i, 1);
        renderGrid();
        renderSidebar();
    }

    function move(idx, dir) {
        const to = idx + dir;
        if (to < 0 || to >= selected.length) return;
        [selected[idx], selected[to]] = [selected[to], selected[idx]];
        renderSidebar();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnContain').classList.toggle('on', m === 'contain');
        document.getElementById('btnFill').classList.toggle('on',    m === 'fill');
        renderSidebar();
    }

    function copyUrl() {
        const url = buildUrl();
        if (!url) return;
        navigator.clipboard.writeText(url).then(() => {
            const el = document.getElementById('copyOk');
            el.textContent = '✓ Copied';
            setTimeout(() => el.textContent = '', 2000);
        }).catch(() => {});
    }

    function openPreview() {
        const url = buildUrl();
        if (url) window.open(url, '_blank');
    }

    /* ── Theme ── */
    function applyTheme(t, save = true) {
        document.documentElement.setAttribute('data-theme', t);
        document.getElementById('themeIcon').textContent = t === 'dark' ? '☀' : '🌙';
        if (save) localStorage.setItem('samui-theme', t);
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(cur === 'dark' ? 'light' : 'dark');
    }
    (function () {
        const s = localStorage.getItem('samui-theme');
        applyTheme(s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'), false);
    })();

    /* ── Nav menu ── */
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('menuBg').classList.toggle('open');
    }

    /* ── Shrink font on card-name if text overflows fixed 48px height ── */
    function fitCardNames() {
        document.querySelectorAll('.card-name').forEach(el => {
            el.style.fontSize = '';
            el.style.height   = 'auto';
            el.style.overflow = 'visible';
            let fs = 12;
            while (el.offsetHeight > 48 && fs > 8) {
                fs -= 0.5;
                el.style.fontSize = fs + 'px';
            }
            el.style.height   = '';
            el.style.overflow = '';
        });
    }

    /* ── Init ── */
    renderGrid();
    fitCardNames();
    renderSidebar();
</script>
</body>
</html>

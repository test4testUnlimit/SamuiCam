<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui — Live Webcams</title>
    <style>
        .hamburger {
            position: fixed;
            top: 48px;
            left: 12px;
            z-index: 1001;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 4px 7px;
            border-radius: 4px;
            opacity: 0.2;
            transition: opacity 0.3s;
            user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .side-menu {
            position: fixed;
            top: 0; left: 0;
            width: 270px;
            height: 100%;
            background: #1a1a1a;
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title {
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 14px;
            border-bottom: 1px solid #282828;
            margin-bottom: 8px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .menu-item {
            display: block;
            color: #999;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 15px;
            font-family: sans-serif;
            transition: background 0.2s;
        }
        .menu-item:hover { background: #2a2a2a; }
        .menu-item.active { color: #4fc; border-left: 3px solid #4fc; }
        .menu-tip {
            margin-top: auto;
            padding: 15px 20px 10px;
            color: #888;
            font-size: 12px;
            font-family: sans-serif;
            border-top: 1px solid #333;
            line-height: 1.5;
        }
        .menu-version {
            padding: 0 20px 14px;
            color: #2e2e2e;
            font-size: 10px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            text-align: right;
            transition: color 0.3s;
        }
        .menu-version:hover { color: #555; }

        /* Основные стили */
        body {
            margin: 0;
            padding: 10px;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 1980px;
            margin: 0 auto;
            height: calc(100% - 20px);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (max-width: 1980px) {
            .grid-container {
                padding: 5px;
                gap: 5px;
            }
        }
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .hamburger {
                font-size: 24px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Navigation</div>
        <a href="/" class="menu-item active">🏠 &nbsp;Home — 9 Cameras</a>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Build a Camera View</a>
        <div class="menu-tip">💡 Copy the page URL and paste into Wallpaper Engine</div>
        <div class="menu-version">v.1.013</div>
    </nav>

    <div class="grid-container">

        </div>
        <!-- Crystal Bay Beach Resort, Lamai -->

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');

        }

</body>
</html>

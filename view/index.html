<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самуи — камеры</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

        #grid {
            display: grid;
            width: 100vw;
            height: 100vh;
        }
        .cell {
            overflow: hidden;
            position: relative;
            background: #000;
        }
        .cell iframe {
            position: absolute;
            border: none;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 100;
            display: flex;
            gap: 6px;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        .controls:hover { opacity: 1; }

        .ctrl-btn {
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: sans-serif;
            transition: all 0.2s;
            text-decoration: none;
        }
        .ctrl-btn:hover { border-color: rgba(255,255,255,0.5); }
        .ctrl-btn.active { border-color: #4fc; color: #4fc; }

        /* Hamburger */
        .hamburger {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1001;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 4px 7px;
            border-radius: 4px;
            opacity: 0.2;
            transition: opacity 0.3s;
            user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }

        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .side-menu {
            position: fixed;
            top: 0; left: 0;
            width: 270px;
            height: 100%;
            background: #1a1a1a;
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
            font-family: sans-serif;
        }
        .menu-item {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            font-size: 14px;
            font-family: sans-serif;
            transition: background 0.2s;
        }
        .menu-item:hover { background: #2a2a2a; }
        .menu-item.active { color: #4fc; border-left: 3px solid #4fc; }
        .menu-sep {
            border: none;
            border-top: 1px solid #222;
            margin: 8px 0;
        }
        .menu-tip {
            margin-top: auto;
            padding: 15px 20px;
            color: #888;
            font-size: 12px;
            font-family: sans-serif;
            border-top: 1px solid #333;
            line-height: 1.5;
        }

        /* Empty state */
        .empty {
            color: #fff;
            font-family: sans-serif;
            padding: 60px;
            text-align: center;
        }
        .empty a { color: #4fc; }
    </style>
</head>
<body>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Навигация</div>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Конструктор</a>
        <hr class="menu-sep">
        <a href="/index.html" class="menu-item">⊞ &nbsp;9 камер (3×3)</a>
        <a href="/180-3/index.html" class="menu-item">▬ &nbsp;Панорама + 2 камеры</a>
        <a href="/180-2/360.html" class="menu-item">◫ &nbsp;2 панорамных 180°</a>
        <div class="menu-tip">💡 Скопируй URL страницы и вставь в Wallpaper Engine</div>
    </nav>

    <div id="grid"></div>

    <div class="controls">
        <button class="ctrl-btn" id="btnContain" onclick="setMode('contain')">contain</button>
        <button class="ctrl-btn" id="btnFill" onclick="setMode('fill')">fill</button>
        <a href="/builder/" class="ctrl-btn">← builder</a>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const cams = (params.get('cams') || '').split(',').filter(Boolean);
        let mode = params.get('mode') || 'fill';

        const grid = document.getElementById('grid');

        function getCols(n) {
            if (n <= 1) return 1;
            if (n <= 2) return 2;
            if (n <= 3) return 3;
            if (n <= 4) return 2;
            if (n <= 6) return 3;
            return 3;
        }

        function buildGrid() {
            const cols = getCols(cams.length);
            const rows = Math.ceil(cams.length / cols);
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            grid.innerHTML = '';
            cams.forEach(id => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&iv_load_policy=3`;
                iframe.setAttribute('allowfullscreen', '');
                cell.appendChild(iframe);
                grid.appendChild(cell);
            });
        }

        function applyMode() {
            const cols = getCols(cams.length);
            const rows = Math.ceil(cams.length / cols);
            const cellW = window.innerWidth / cols;
            const cellH = window.innerHeight / rows;
            const ratio = 16 / 9;
            const cellRatio = cellW / cellH;

            document.querySelectorAll('.cell iframe').forEach(iframe => {
                let iframeW, iframeH;
                if (mode === 'contain') {
                    if (cellRatio > ratio) {
                        iframeH = cellH;
                        iframeW = cellH * ratio;
                    } else {
                        iframeW = cellW;
                        iframeH = cellW / ratio;
                    }
                } else { // fill
                    if (cellRatio > ratio) {
                        iframeW = cellW;
                        iframeH = cellW / ratio;
                    } else {
                        iframeH = cellH;
                        iframeW = cellH * ratio;
                    }
                }
                iframe.style.width = iframeW + 'px';
                iframe.style.height = iframeH + 'px';
                iframe.style.top = ((cellH - iframeH) / 2) + 'px';
                iframe.style.left = ((cellW - iframeW) / 2) + 'px';
            });

            document.getElementById('btnContain').classList.toggle('active', mode === 'contain');
            document.getElementById('btnFill').classList.toggle('active', mode === 'fill');
        }

        function setMode(m) {
            mode = m;
            const url = new URL(location.href);
            url.searchParams.set('mode', m);
            history.replaceState({}, '', url);
            applyMode();
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        if (cams.length === 0) {
            grid.innerHTML = '<div class="empty"><h2>Камеры не выбраны</h2><p style="margin-top:12px">Перейди в <a href="/builder/">конструктор</a></p></div>';
        } else {
            buildGrid();
            applyMode();
            window.addEventListener('resize', applyMode);
        }
    </script>
</body>
</html>

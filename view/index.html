<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui — Live Cameras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

        #grid { display: grid; width: 100vw; height: 100vh; }
        .cell { overflow: hidden; position: relative; background: #000; }
        .cell iframe { position: absolute; border: none; }

        /* ── Hamburger ── */
        .hamburger {
            position: fixed;
            top: 48px;
            left: 12px;
            z-index: 1001;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            opacity: 0.2;
            transition: opacity 0.3s;
            user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }

        /* ── Side menu ── */
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .side-menu {
            position: fixed;
            top: 0; left: 0;
            width: 260px;
            height: 100%;
            background: #1a1a1a;
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title {
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 14px;
            border-bottom: 1px solid #282828;
            margin-bottom: 8px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .menu-item {
            display: block;
            color: #888;
            text-decoration: none;
            padding: 13px 20px;
            font-size: 14px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item:hover { background: #242424; color: #ccc; }
        .menu-item.active { color: #4fc; border-left: 3px solid #4fc; padding-left: 17px; }
        .menu-sep { border: none; border-top: 1px solid #222; margin: 6px 0; }
        .menu-tip {
            margin-top: auto;
            padding: 14px 20px;
            color: #666;
            font-size: 11px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            border-top: 1px solid #282828;
            line-height: 1.55;
        }

        /* ── Gear button — same fade behavior as hamburger ── */
        .gear-btn {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 300;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            transition: opacity 0.3s, border-color 0.2s;
            user-select: none;
        }
        .gear-btn:hover { opacity: 0.85; }
        .gear-btn.active { opacity: 1; border-color: #4fc; color: #4fc; }

        /* ── Empty state ── */
        .empty { color: #888; font-family: 'Segoe UI', system-ui, sans-serif; padding: 60px; text-align: center; }
        .empty h2 { color: #ccc; font-weight: 400; margin-bottom: 12px; }
        .empty a { color: #4fc; }

        /* ── Settings panel ── */
        .settings-panel {
            position: fixed;
            bottom: 56px;
            right: 12px;
            width: 272px;
            background: #181818;
            border: 1px solid #2c2c2c;
            border-radius: 8px;
            z-index: 250;
            font-family: 'Segoe UI', system-ui, sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            transform: translateY(10px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.2s ease, opacity 0.18s ease;
        }
        .settings-panel.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .sp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 14px 10px;
            border-bottom: 1px solid #242424;
        }
        .sp-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; }
        .sp-close { color: #444; cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.15s; }
        .sp-close:hover { color: #aaa; }

        .sp-section { padding: 10px 14px; border-bottom: 1px solid #202020; }
        .sp-section:last-child { border-bottom: none; }
        .sp-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }

        /* Mode toggle (Contain / Fill) */
        .mode-toggle { display: flex; border: 1px solid #252525; border-radius: 4px; overflow: hidden; }
        .mode-btn {
            flex: 1;
            padding: 8px 6px;
            background: none;
            border: none;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            line-height: 1.3;
            text-align: center;
        }
        .mode-btn small { display: block; font-size: 10px; color: #333; margin-top: 1px; }
        .mode-btn:hover { color: #aaa; }
        .mode-btn.active { background: #111; color: #4fc; }
        .mode-btn.active small { color: #2a6a5a; }

        /* Camera order list */
        .cam-list { display: flex; flex-direction: column; gap: 3px; }
        .cam-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 7px;
            background: #111;
            border-radius: 4px;
        }
        .cam-idx { font-size: 10px; color: #333; width: 14px; text-align: right; flex-shrink: 0; }
        .cam-row-name {
            flex: 1;
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cam-row-btns { display: flex; gap: 2px; flex-shrink: 0; }
        .cam-row-btn {
            background: none;
            border: 1px solid #252525;
            color: #4a4a4a;
            font-size: 11px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 3px;
            transition: all 0.15s;
            line-height: 1.2;
            font-family: inherit;
            min-width: 26px;
            text-align: center;
        }
        .cam-row-btn:hover:not(:disabled) { border-color: #555; color: #ddd; }
        .cam-row-btn:disabled { opacity: 0.18; cursor: default; }
        .mirror-btn.on { border-color: #4fc; color: #4fc; }

        /* Layout selector */
        .layout-btns { display: flex; gap: 4px; }
        .layout-btn {
            flex: 1;
            padding: 8px 4px;
            background: none;
            border: 1px solid #252525;
            color: #555;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
            font-family: inherit;
            text-align: center;
            line-height: 1.3;
        }
        .layout-btn small { display: block; font-size: 9px; color: #333; margin-top: 2px; }
        .layout-btn:hover { border-color: #555; color: #ccc; }
        .layout-btn.active { border-color: #4fc; color: #4fc; background: rgba(68,255,204,0.04); }
        .layout-btn.active small { color: #2a7060; }

        /* Copy link */
        .sp-copy-btn {
            width: 100%;
            padding: 10px;
            background: #4fc;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .sp-copy-btn:hover { background: #6ffccc; }
        .sp-copy-ok { text-align: center; font-size: 11px; color: #4fc; height: 16px; margin-top: 6px; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .hamburger { font-size: 20px; padding: 7px 11px; top: 44px; }
            .gear-btn { width: 44px; height: 44px; font-size: 18px; bottom: 8px; right: 8px; }
            .settings-panel {
                right: 0; left: 0;
                width: auto;
                margin: 0 8px;
                bottom: 60px;
                border-radius: 8px;
            }
            .cam-row-btn { padding: 5px 8px; font-size: 13px; min-width: 30px; }
            .layout-btn { padding: 10px 4px; font-size: 12px; }
            .sp-copy-btn { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Navigation</div>
        <a href="/" class="menu-item">🏠 &nbsp;Home — 9 Cameras</a>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Build a Camera View</a>
        <div class="menu-tip">💡 Copy the page URL and paste into Wallpaper Engine</div>
    </nav>

    <div id="grid"></div>

    <!-- Only visible UI element on screen: gear button -->
    <div class="gear-btn" id="gearBtn" onclick="togglePanel()" title="Controls">⚙</div>

    <!-- Settings panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="sp-header">
            <span class="sp-title">Controls</span>
            <span class="sp-close" onclick="togglePanel()">×</span>
        </div>

        <div class="sp-section">
            <div class="sp-label">Mode</div>
            <div class="mode-toggle">
                <button class="mode-btn" id="btnContain" onclick="setMode('contain')">
                    Contain
                    <small>no crop</small>
                </button>
                <button class="mode-btn" id="btnFill" onclick="setMode('fill')">
                    Fill
                    <small>fill screen</small>
                </button>
            </div>
        </div>

        <div class="sp-section">
            <div class="sp-label">Order · Mirror</div>
            <div class="cam-list" id="camList"></div>
        </div>

        <div class="sp-section">
            <div class="sp-label">Layout</div>
            <div class="layout-btns">
                <button class="layout-btn" id="layAuto" onclick="setLayout('auto')">
                    ⊞ Auto<small>smart grid</small>
                </button>
                <button class="layout-btn" id="layH" onclick="setLayout('h')">
                    ═ Stack<small>single column</small>
                </button>
                <button class="layout-btn" id="layV" onclick="setLayout('v')">
                    ║ Row<small>single row</small>
                </button>
            </div>
        </div>

        <div class="sp-section">
            <button class="sp-copy-btn" onclick="copyLink()">Copy Link</button>
            <div class="sp-copy-ok" id="copyOk"></div>
        </div>
    </div>

    <script>
        const STREAMS = {
            "3N3ZwIB_X4Y": "Crystal Bay Yacht Club, Lamai",
            "Fw9hgttWzIg": "Crystal Bay Beach Resort, Lamai",
            "Tpj0cmMVOd0": "Baobab Cam, Lamai",
            "UJpFtzKug7M": "Royal Muang Samui Villas, Choeng Mon",
            "Kush_ZxTy2c": "Black Pearl, Lamai",
            "LGNYKz4yziE": "Crystal Bay Yacht Club — Panoramic",
            "NTTtqzL5OWI": "Crystal Bay Beach Resort — Panoramic",
            "FBYUkqutqzE": "House of Sanskara, Koh Phangan",
        };

        const params    = new URLSearchParams(location.search);
        let currentCams = (params.get('cams') || '').split(',').filter(Boolean);
        let mode        = params.get('mode') || 'fill';
        let layout      = params.get('layout') || 'auto';
        let mirrorSet   = new Set(
            (params.get('mirror') || '').split(',').filter(Boolean).map(Number)
        );

        const grid = document.getElementById('grid');

        /* ── Grid geometry ── */
        function getColsAuto(n) {
            if (n <= 1) return 1;
            if (n <= 2) return 2;
            if (n <= 3) return 3;
            if (n <= 4) return 2;
            return 3;
        }
        function getGrid(n) {
            if (layout === 'h') return { cols: 1, rows: n };
            if (layout === 'v') return { cols: n, rows: 1 };
            const cols = getColsAuto(n);
            return { cols, rows: Math.ceil(n / cols) };
        }

        /* ── Build iframes ── */
        function buildGrid() {
            const { cols, rows } = getGrid(currentCams.length);
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
            grid.innerHTML = '';
            currentCams.forEach((id, i) => {
                const cell   = document.createElement('div');
                cell.className = 'cell';
                const iframe = document.createElement('iframe');
                iframe.src   = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&iv_load_policy=3`;
                iframe.setAttribute('allowfullscreen', '');
                if (mirrorSet.has(i)) iframe.style.transform = 'scaleX(-1)';
                cell.appendChild(iframe);
                grid.appendChild(cell);
            });
        }

        /* ── Size iframes to match mode ── */
        function applyMode() {
            const { cols, rows } = getGrid(currentCams.length);
            const cellW = window.innerWidth  / cols;
            const cellH = window.innerHeight / rows;
            const ratio = 16 / 9;
            const cr    = cellW / cellH;

            document.querySelectorAll('.cell iframe').forEach((iframe, i) => {
                let iW, iH;
                if (mode === 'contain') {
                    if (cr > ratio) { iH = cellH; iW = cellH * ratio; }
                    else            { iW = cellW;  iH = cellW / ratio; }
                } else {
                    if (cr > ratio) { iW = cellW;  iH = cellW / ratio; }
                    else            { iH = cellH;  iW = cellH * ratio; }
                }
                iframe.style.width  = iW + 'px';
                iframe.style.height = iH + 'px';
                iframe.style.top    = ((cellH - iH) / 2) + 'px';
                iframe.style.left   = ((cellW - iW) / 2) + 'px';
                iframe.style.transform = mirrorSet.has(i) ? 'scaleX(-1)' : '';
            });

            document.getElementById('btnContain').classList.toggle('active', mode === 'contain');
            document.getElementById('btnFill').classList.toggle('active', mode === 'fill');
        }

        /* ── URL state ── */
        function buildUrl() {
            const url = new URL(location.href);
            url.searchParams.set('cams', currentCams.join(','));
            url.searchParams.set('mode', mode);
            if (mirrorSet.size > 0)
                url.searchParams.set('mirror', [...mirrorSet].sort((a, b) => a - b).join(','));
            else
                url.searchParams.delete('mirror');
            if (layout !== 'auto') url.searchParams.set('layout', layout);
            else                   url.searchParams.delete('layout');
            return url.toString();
        }
        function pushUrl() { history.replaceState({}, '', buildUrl()); }

        /* ── Mode ── */
        function setMode(m) { mode = m; pushUrl(); applyMode(); }

        /* ── Layout ── */
        function setLayout(l) { layout = l; pushUrl(); buildGrid(); applyMode(); renderPanel(); }

        /* ── Reorder ── */
        function moveCamera(idx, dir) {
            const to = idx + dir;
            if (to < 0 || to >= currentCams.length) return;
            [currentCams[idx], currentCams[to]] = [currentCams[to], currentCams[idx]];
            const next = new Set();
            mirrorSet.forEach(i => {
                if      (i === idx) next.add(to);
                else if (i === to)  next.add(idx);
                else                next.add(i);
            });
            mirrorSet = next;
            pushUrl(); buildGrid(); applyMode(); renderPanel();
        }

        /* ── Mirror ── */
        function toggleMirror(idx) {
            if (mirrorSet.has(idx)) mirrorSet.delete(idx);
            else                    mirrorSet.add(idx);
            pushUrl();
            const iframe = document.querySelectorAll('.cell iframe')[idx];
            if (iframe) iframe.style.transform = mirrorSet.has(idx) ? 'scaleX(-1)' : '';
            renderPanel();
        }

        /* ── Panel ── */
        function togglePanel() {
            const panel = document.getElementById('settingsPanel');
            const gear  = document.getElementById('gearBtn');
            const open  = panel.classList.toggle('open');
            gear.classList.toggle('active', open);
            if (open) renderPanel();
        }

        function renderPanel() {
            const n    = currentCams.length;
            const list = document.getElementById('camList');
            list.innerHTML = currentCams.map((id, i) => {
                const name = STREAMS[id] || id;
                return `<div class="cam-row">
                    <span class="cam-idx">${i + 1}</span>
                    <span class="cam-row-name" title="${name}">${name}</span>
                    <div class="cam-row-btns">
                        <button class="cam-row-btn mirror-btn ${mirrorSet.has(i) ? 'on' : ''}"
                                onclick="toggleMirror(${i})" title="Mirror">⇄</button>
                        <button class="cam-row-btn" onclick="moveCamera(${i}, -1)"
                                ${i === 0 ? 'disabled' : ''} title="Move up">↑</button>
                        <button class="cam-row-btn" onclick="moveCamera(${i}, 1)"
                                ${i === n - 1 ? 'disabled' : ''} title="Move down">↓</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('layAuto').classList.toggle('active', layout === 'auto');
            document.getElementById('layH').classList.toggle('active', layout === 'h');
            document.getElementById('layV').classList.toggle('active', layout === 'v');
        }

        /* ── Copy link ── */
        function copyLink() {
            pushUrl();
            navigator.clipboard.writeText(location.href).then(() => {
                const el = document.getElementById('copyOk');
                el.textContent = '✓ Copied';
                setTimeout(() => el.textContent = '', 2200);
            });
        }

        /* ── Nav menu ── */
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        /* ── Init ── */
        if (currentCams.length === 0) {
            grid.innerHTML = `<div class="empty">
                <h2>No cameras selected</h2>
                <p>Go to the <a href="/builder/">Builder</a> to create a custom view</p>
            </div>`;
        } else {
            buildGrid();
            applyMode();
            window.addEventListener('resize', applyMode);
        }
    </script>
</body>
</html>

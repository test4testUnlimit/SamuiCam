<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui — Live Cameras</title>
    <style>
        /* ── Theme tokens ── */
        :root {
            --bg-panel:  #181818;
            --bd:        #2c2c2c;
            --bd2:       #242424;
            --bd3:       #202020;
            --t1:        #ddd;
            --t2:        #999;
            --t3:        #555;
            --t4:        #333;
            --t5:        #4a4a4a;
            --ac:        #4fc;
            --ac-dim:    rgba(68,255,204,0.04);
            --ac-dim2:   #2a7060;
            --overlay:   rgba(0,0,0,0.5);
            --gear-bg:   rgba(0,0,0,0.35);
            --gear-c:    #fff;
        }
        [data-theme="light"] {
            --bg-panel:  #ffffff;
            --bd:        #e0e0e0;
            --bd2:       #ebebeb;
            --bd3:       #f0f0f0;
            --t1:        #1a1a1a;
            --t2:        #555;
            --t3:        #999;
            --t4:        #bbb;
            --t5:        #777;
            --ac:        #0d6efd;
            --ac-dim:    rgba(13,110,253,0.07);
            --ac-dim2:   #0044bb;
            --overlay:   rgba(0,0,0,0.3);
            --gear-bg:   rgba(255,255,255,0.55);
            --gear-c:    #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

        #grid { display: grid; width: 100vw; height: 100vh; }
        .cell { overflow: hidden; position: relative; background: #000; will-change: transform; }
        .cell iframe { position: absolute; border: none; top: 0; left: 0; width: 100%; height: 100%; }
        .cam-label {
            position: absolute; top: 12px; left: 12px; z-index: 10;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: clamp(8px, 0.9vw, 11px);
            color: rgba(255,255,255,0.32);
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            letter-spacing: 0.03em;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 24px);
            display: flex; align-items: center; gap: 4px;
        }
        .cam-dot { font-size: 0.7em; }
        .cam-dot-warn { color: rgba(255,180,0,0.7); }

        /* ── Hamburger ── */
        .hamburger {
            position: fixed; top: 48px; left: 12px; z-index: 1001;
            cursor: pointer; font-size: 16px; color: #fff;
            background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px;
            opacity: 0.2; transition: opacity 0.3s; user-select: none; -webkit-user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }

        /* ── Side menu ── */
        .menu-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; inset: 0; background: var(--overlay); z-index: 1002; }
        .side-menu {
            position: fixed; top: 0; left: 0; width: 260px; height: 100%;
            background: var(--bg-panel); border-right: 1px solid var(--bd);
            z-index: 1003; transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column; padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title { color: var(--t3); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; padding: 0 20px 14px; border-bottom: 1px solid var(--bd); margin-bottom: 8px; font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        .menu-item { display: block; color: var(--t2); text-decoration: none; padding: 13px 20px; font-size: 14px; font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        .menu-item:hover { background: var(--bd); color: var(--t1); }
        .menu-item.active { color: var(--ac); border-left: 3px solid var(--ac); padding-left: 17px; }
        .menu-sep { border: none; border-top: 1px solid var(--bd); margin: 6px 0; }
        .menu-theme { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; cursor: pointer; transition: background 0.2s; }
        .menu-theme:hover { background: var(--bd); }
        .menu-theme span { color: var(--t2); font-size: 13px; font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        .theme-icon { font-size: 15px; }
        .menu-tip { margin-top: auto; padding: 14px 20px 8px; color: var(--t2); font-size: 11px; font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; border-top: 1px solid var(--bd); line-height: 1.55; }
        .menu-version { padding: 4px 20px 14px; color: var(--t2); font-size: 11px; font-family: 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace; text-align: right; }

        /* ── Gear button — same fade as hamburger ── */
        .gear-btn {
            position: fixed; bottom: 12px; right: 12px; z-index: 300;
            width: 36px; height: 36px;
            background: var(--gear-bg);
            border: 1px solid rgba(128,128,128,0.18);
            border-radius: 5px; color: var(--gear-c);
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.2; transition: opacity 0.3s, border-color 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .gear-btn:hover { opacity: 0.85; }
        .gear-btn.active { opacity: 1; border-color: var(--ac); color: var(--ac); }

        /* ── Spotlight overlay for first-visit gear hint ── */
        .hint-bg {
            position: fixed; top: 0; right: 0; bottom: 0; left: 0; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 295;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }
        .hint-bg.active { opacity: 1; }

        /* Gear pulse for first-time visitors */
        @keyframes gear-pulse {
            0%   { opacity: 1; box-shadow: 0 0 0 0 rgba(68,255,204,0.7); transform: scale(1); border-color: rgba(68,255,204,0.8); }
            40%  { opacity: 1; box-shadow: 0 0 0 20px rgba(68,255,204,0.15); transform: scale(1.22); border-color: rgba(68,255,204,0.6); }
            70%  { opacity: 1; box-shadow: 0 0 0 38px rgba(68,255,204,0); transform: scale(1.08); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(68,255,204,0); transform: scale(1); }
        }
        .gear-btn.pulsing {
            animation: gear-pulse 1.3s ease-out 5;
            opacity: 1 !important;
            z-index: 300;
        }

        /* ── Empty state ── */
        .empty { color: var(--t2); font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 60px; text-align: center; }
        .empty h2 { color: var(--t1); font-weight: 400; margin-bottom: 12px; }
        .empty a { color: var(--ac); }

        /* ── Settings panel ── */
        .settings-panel {
            position: fixed; bottom: 56px; right: 12px; width: 272px;
            background: var(--bg-panel); border: 1px solid var(--bd);
            border-radius: 8px; z-index: 250;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            transform: translateY(10px); opacity: 0; pointer-events: none;
            transition: transform 0.2s ease, opacity 0.18s ease;
        }
        .settings-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

        .sp-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px 10px; border-bottom: 1px solid var(--bd2); }
        .sp-title { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: 1.5px; }
        .sp-close { color: var(--t4); cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.15s; }
        .sp-close:hover { color: var(--t1); }

        .sp-section { padding: 10px 14px; border-bottom: 1px solid var(--bd3); }
        .sp-section:last-child { border-bottom: none; }
        .sp-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }

        /* Mode toggle (Contain / Fill) */
        .mode-toggle { display: flex; border: 1px solid var(--bd); border-radius: 4px; overflow: hidden; }
        .mode-btn { flex: 1; padding: 8px 6px; background: none; border: none; color: var(--t3); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; line-height: 1.3; text-align: center; }
        .mode-btn small { display: block; font-size: 10px; color: var(--t4); margin-top: 1px; }
        .mode-btn:hover { color: var(--t2); }
        .mode-btn.active { background: var(--bd3); color: var(--ac); }
        .mode-btn.active small { color: var(--t3); }

        /* Camera list */
        .cam-list { display: flex; flex-direction: column; gap: 3px; }
        .cam-row { display: flex; align-items: center; gap: 4px; padding: 5px 7px; background: rgba(0,0,0,0.25); border-radius: 4px; }
        [data-theme="light"] .cam-row { background: var(--bd3); }
        .cam-idx { font-size: 10px; color: var(--t4); width: 14px; text-align: right; flex-shrink: 0; }
        .cam-row-name { flex: 1; font-size: 11px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cam-row-btns { display: flex; gap: 2px; flex-shrink: 0; }
        .cam-row-btn { background: none; border: 1px solid var(--bd); color: var(--t5); font-size: 11px; cursor: pointer; padding: 3px 6px; border-radius: 3px; transition: all 0.15s; line-height: 1.2; font-family: inherit; min-width: 26px; text-align: center; }
        .cam-row-btn:hover:not(:disabled) { border-color: var(--t2); color: var(--t1); }
        .cam-row-btn:disabled { opacity: 0.18; cursor: default; }
        .mirror-btn.on { border-color: var(--ac); color: var(--ac); }

        /* Layout selector */
        .layout-btns { display: flex; gap: 4px; }
        .layout-btn { flex: 1; padding: 8px 4px; background: none; border: 1px solid var(--bd); color: var(--t3); font-size: 11px; cursor: pointer; border-radius: 4px; transition: all 0.15s; font-family: inherit; text-align: center; line-height: 1.3; }
        .layout-btn small { display: block; font-size: 9px; color: var(--t4); margin-top: 2px; }
        .layout-btn:hover { border-color: var(--t2); color: var(--t1); }
        .layout-btn.active { border-color: var(--ac); color: var(--ac); background: var(--ac-dim); }
        .layout-btn.active small { color: var(--ac-dim2); }

        /* Copy */
        .sp-copy-btn { width: 100%; padding: 10px; background: var(--ac); color: #000; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
        .sp-copy-btn:hover { filter: brightness(1.12); }
        .sp-copy-ok { text-align: center; font-size: 11px; color: var(--ac); height: 16px; margin-top: 6px; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .hamburger { font-size: 20px; padding: 7px 11px; top: 44px; }
            .gear-btn { width: 44px; height: 44px; font-size: 18px; bottom: 8px; right: 8px; }
            .settings-panel { right: 0; left: 0; width: auto; margin: 0 8px; bottom: 60px; }
            .cam-row-btn { padding: 5px 8px; font-size: 13px; min-width: 30px; }
            .layout-btn { padding: 10px 4px; font-size: 12px; }
            .sp-copy-btn { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Navigation</div>
        <a href="/"         class="menu-item">🏠 &nbsp;Home</a>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Build a Camera View</a>
        <hr class="menu-sep">
        <div class="menu-theme" onclick="toggleTheme()">
            <span>Theme</span>
            <span class="theme-icon" id="themeIcon">☀</span>
        </div>
        <hr class="menu-sep">
        <div class="menu-tip">💡 Copy the page URL and paste into Wallpaper Engine</div>
        <div class="menu-version">v.1.022</div>
    </nav>

    <div id="grid"></div>

    <div class="hint-bg" id="hintBg"></div>
    <div class="gear-btn" id="gearBtn" onclick="togglePanel()" title="Controls">⚙</div>

    <div class="settings-panel" id="settingsPanel">
        <div class="sp-header">
            <span class="sp-title">Controls</span>
            <span class="sp-close" onclick="togglePanel()">×</span>
        </div>
        <div class="sp-section">
            <div class="sp-label">Mode</div>
            <div class="mode-toggle">
                <button class="mode-btn" id="btnContain" onclick="setMode('contain')">Contain<small>no crop</small></button>
                <button class="mode-btn" id="btnFill"    onclick="setMode('fill')">Fill<small>fill screen</small></button>
            </div>
        </div>
        <div class="sp-section">
            <div class="sp-label">Order · Mirror</div>
            <div class="cam-list" id="camList"></div>
        </div>
        <div class="sp-section">
            <div class="sp-label">Layout</div>
            <div class="layout-btns">
                <button class="layout-btn" id="layAuto" onclick="setLayout('auto')">⊞ Auto<small>smart grid</small></button>
                <button class="layout-btn" id="layH"    onclick="setLayout('h')">═ Stack<small>single column</small></button>
                <button class="layout-btn" id="layV"    onclick="setLayout('v')">║ Row<small>single row</small></button>
            </div>
        </div>
        <div class="sp-section">
            <button class="sp-copy-btn" onclick="copyLink()">Copy Link</button>
            <div class="sp-copy-ok" id="copyOk"></div>
        </div>
    </div>

    <script>
        const STREAMS = {
            // 🇹🇭 Koh Samui
            "3N3ZwIB_X4Y": "Crystal Bay Yacht Club, Lamai",
            "Fw9hgttWzIg": "Crystal Bay Beach Resort, Lamai",
            "Tpj0cmMVOd0": "Baobab Cam, Lamai",
            "UJpFtzKug7M": "Royal Muang Samui Villas, Choeng Mon",
            "Kush_ZxTy2c": "Black Pearl, Lamai",
            "LGNYKz4yziE": "Crystal Bay Yacht Club — Panoramic",
            "NTTtqzL5OWI": "Crystal Bay Beach Resort — Panoramic",
            "FBYUkqutqzE": "House of Sanskara, Koh Phangan",
            "x73IEW0fOo0": "Floating Lotus · Big Buddha, Koh Samui",
            "wP6hpWgPJ98": "Banyan Tree Samui",
            "Sm9y8G0TLXI": "No Stress Restaurant, Lamai",
            // 🇸🇨 Seychelles
            "Thtj8Ht7Z_c": "Seychelles Ocean 4K",
            // 🇲🇻 Maldives
            "pn3lAmLSva0": "Maamunagau Island, Maldives",
            "Mu0dzKm5ZaE": "Paradise Found, Maldives",
            "XrLz_hOBCT8": "Indian Ocean 4K",
            "_BMi3usEwi8": "InterContinental Resort, Maldives",
            // 🇺🇸 Hawaii
            "X0idnu7HUmI": "Sheraton Waikiki, Hawaii",
            "YcEf_y0Ct14": "Napili Sunset Resort, Maui",
            // 🌴 Caribbean
            "vxHKAImxUHk": "Simpson Bay Beach, Saint Martin",
            // 🇵🇭 Philippines
            "UDAZWxehMAI": "Mayon Volcano, Philippines",
            // 🇨🇭 Europe
            "enYFXf8u7Lc": "Swiss Alps Panorama",
            // 🛸 Space
            "vytmBNhc9ig": "NASA ISS — Earth from Space",
        };

        // ══ CAM REDIRECTS — old ID → new ID (auto-maintained by update_streams.py) ══
        const CAM_REDIRECTS = {};
        // ══ END CAM_REDIRECTS ══

        const params     = new URLSearchParams(location.search);
        const rawCams    = (params.get('cams') || '').split(',').filter(Boolean);
        const redirected = new Set(rawCams.filter(id => CAM_REDIRECTS[id]));
        let currentCams  = rawCams.map(id => CAM_REDIRECTS[id] || id);
        let mode        = params.get('mode') || 'fill';
        let layout      = params.get('layout') || 'auto';
        let mirrorSet   = new Set((params.get('mirror') || '').split(',').filter(Boolean).map(Number));

        const grid = document.getElementById('grid');

        function getColsAuto(n) {
            if (n <= 1) return 1; if (n <= 2) return 2;
            if (n <= 3) return 3; if (n <= 4) return 2; return 3;
        }
        function getGrid(n) {
            if (layout === 'h') return { cols: 1, rows: n };
            if (layout === 'v') return { cols: n, rows: 1 };
            const cols = getColsAuto(n);
            return { cols, rows: Math.ceil(n / cols) };
        }

        function buildGrid() {
            const { cols, rows } = getGrid(currentCams.length);
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
            grid.innerHTML = '';
            currentCams.forEach((id, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&iv_load_policy=3`;
                iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
                iframe.setAttribute('allowfullscreen', '');
                cell.appendChild(iframe);
                const label = document.createElement('div');
                label.className = 'cam-label';
                const wasRedirected = redirected.has(rawCams[i]);
                label.innerHTML = (wasRedirected ? '<span class="cam-dot cam-dot-warn">●</span>' : '') + (STREAMS[id] || id);
                cell.appendChild(label);
                grid.appendChild(cell);
            });
        }

        function applyMode() {
            const cells = document.querySelectorAll('.cell');
            const ratio = 16 / 9;
            cells.forEach((cell, i) => {
                const iframe = cell.querySelector('iframe');
                if (!iframe) return;
                const { width: cW, height: cH } = cell.getBoundingClientRect();
                const cr = (cW && cH) ? cW / cH : ratio;
                const scale = (mode === 'fill')
                    ? (cr > ratio ? cr / ratio : ratio / cr)
                    : 1;
                const parts = [];
                if (scale > 1.001) parts.push(`scale(${scale.toFixed(4)})`);
                if (mirrorSet.has(i)) parts.push('scaleX(-1)');
                iframe.style.transform = parts.join(' ');
            });
            document.getElementById('btnContain').classList.toggle('active', mode === 'contain');
            document.getElementById('btnFill').classList.toggle('active', mode === 'fill');
        }

        function buildUrl() {
            const url = new URL(location.href);
            url.searchParams.set('cams', currentCams.join(','));
            url.searchParams.set('mode', mode);
            if (mirrorSet.size > 0) url.searchParams.set('mirror', [...mirrorSet].sort((a,b)=>a-b).join(','));
            else url.searchParams.delete('mirror');
            if (layout !== 'auto') url.searchParams.set('layout', layout);
            else url.searchParams.delete('layout');
            return url.toString();
        }
        function pushUrl() { history.replaceState({}, '', buildUrl()); }

        function setMode(m) { mode = m; pushUrl(); applyMode(); }

        function setLayout(l) { layout = l; pushUrl(); buildGrid(); applyMode(); renderPanel(); }

        function moveCamera(idx, dir) {
            const to = idx + dir;
            if (to < 0 || to >= currentCams.length) return;
            [currentCams[idx], currentCams[to]] = [currentCams[to], currentCams[idx]];
            const next = new Set();
            mirrorSet.forEach(i => { if (i===idx) next.add(to); else if (i===to) next.add(idx); else next.add(i); });
            mirrorSet = next;
            pushUrl(); buildGrid(); applyMode(); renderPanel();
        }

        function toggleMirror(idx) {
            if (mirrorSet.has(idx)) mirrorSet.delete(idx); else mirrorSet.add(idx);
            pushUrl();
            applyMode();
            renderPanel();
        }

        function togglePanel() {
            const panel = document.getElementById('settingsPanel');
            const gear  = document.getElementById('gearBtn');
            const open  = panel.classList.toggle('open');
            gear.classList.toggle('active', open);
            if (open) renderPanel();
        }

        function renderPanel() {
            const n = currentCams.length;
            document.getElementById('camList').innerHTML = currentCams.map((id, i) => {
                const name = STREAMS[id] || id;
                return `<div class="cam-row">
                    <span class="cam-idx">${i+1}</span>
                    <span class="cam-row-name" title="${name}">${name}</span>
                    <div class="cam-row-btns">
                        <button class="cam-row-btn mirror-btn ${mirrorSet.has(i)?'on':''}" onclick="toggleMirror(${i})" title="Mirror">⇄</button>
                        <button class="cam-row-btn" onclick="moveCamera(${i},-1)" ${i===0?'disabled':''}>↑</button>
                        <button class="cam-row-btn" onclick="moveCamera(${i}, 1)" ${i===n-1?'disabled':''}>↓</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('layAuto').classList.toggle('active', layout==='auto');
            document.getElementById('layH').classList.toggle('active', layout==='h');
            document.getElementById('layV').classList.toggle('active', layout==='v');
        }

        function copyLink() {
            pushUrl();
            navigator.clipboard.writeText(location.href).then(() => {
                const el = document.getElementById('copyOk');
                el.textContent = '✓ Copied';
                setTimeout(() => el.textContent = '', 2200);
            }).catch(() => {});
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        /* ── Theme ── */
        function initTheme() {
            const stored = localStorage.getItem('samui-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(stored || (prefersDark ? 'dark' : 'light'), false);
        }
        function applyTheme(t, save = true) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeIcon').textContent = t === 'dark' ? '☀' : '🌙';
            if (save) localStorage.setItem('samui-theme', t);
        }
        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(cur === 'dark' ? 'light' : 'dark');
        }
        initTheme();

        /* ── Init grid ── */
        if (currentCams.length === 0) {
            grid.innerHTML = `<div class="empty"><h2>No cameras selected</h2><p>Go to the <a href="/builder/">Builder</a> to create a custom view</p></div>`;
        } else {
            buildGrid(); applyMode();
            window.addEventListener('resize', applyMode);
        }

        /* ── Gear pulse on first visit ── */
        if (!localStorage.getItem('samui-gear-seen') && currentCams.length > 0) {
            setTimeout(() => {
                const gear = document.getElementById('gearBtn');
                const bg   = document.getElementById('hintBg');
                bg.classList.add('active');
                gear.classList.add('pulsing');
                gear.addEventListener('animationend', () => {
                    gear.classList.remove('pulsing');
                    bg.classList.remove('active');
                    localStorage.setItem('samui-gear-seen', '1');
                }, { once: true });
            }, 2000);
        }
    </script>
</body>
</html>

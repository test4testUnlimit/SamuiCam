<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самуи: Crystal Bay и Bangrak Beach</title>
    <style>
        .hamburger {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            cursor: pointer;
            font-size: 28px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 50%;
            transition: all 0.3s;
            user-select: none;
        }
        .hamburger:hover { background: rgba(0,0,0,0.8); }
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .side-menu {
            position: fixed;
            top: 0; left: 0;
            width: 270px;
            height: 100%;
            background: #1a1a1a;
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
            font-family: sans-serif;
        }
        .menu-item {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 15px;
            font-family: sans-serif;
            transition: background 0.2s;
        }
        .menu-item:hover { background: #2a2a2a; }
        .menu-item.active { color: #4fc; border-left: 3px solid #4fc; }
        .menu-tip {
            margin-top: auto;
            padding: 15px 20px;
            color: #888;
            font-size: 12px;
            font-family: sans-serif;
            border-top: 1px solid #333;
            line-height: 1.5;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
        }

        /* Контейнер для главной 180° камеры */
        .main-180 {
            position: relative;
            width: 100vw;
            height: 60vh;
            overflow: hidden;
        }

        .main-180 iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180%;
            height: 100%;
            transform: translate(-50%, -50%);
            border: none;
            aspect-ratio: 2/1;
        }

        /* Сетка для двух основных камер */
        .main-cams {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            height: calc(40vh - 40px);
        }

        .video-wrapper {
            position: relative;
            height: 100%;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .video-wrapper:hover {
            transform: scale(1.02);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .main-cams {
                grid-template-columns: 1fr;
                height: auto;
            }
            .main-180 {
                height: 50vh;
            }
            .hamburger {
                font-size: 24px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Виды камер</div>
        <a href="/index.html" class="menu-item">⊞ &nbsp;9 камер (сетка 3×3)</a>
        <a href="/180-3/index.html" class="menu-item active">▬ &nbsp;Панорама + 2 камеры</a>
        <a href="/180-2/360.html" class="menu-item">◫ &nbsp;2 панорамных 180°</a>
        <div class="menu-tip">💡 Скопируй URL страницы и вставь в Wallpaper Engine</div>
    </nav>

    <!-- 180° камера с принудительным соотношением -->
    <div class="main-180">
        <iframe src="https://www.youtube.com/embed/zK_BsJ2Z0Us?autoplay=1&mute=1&iv_load_policy=3&controls=0" 
                allowfullscreen>
        </iframe>
    </div>

    <!-- Основные камеры -->
    <div class="main-cams">
        <!-- Crystal Bay Beach -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/5FNI26lPfgE?autoplay=1&mute=1&iv_load_policy=3" 
                    allowfullscreen>
            </iframe>
        </div>

        <!-- Bangrak Beach -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/Fw9hgttWzIg?autoplay=1&mute=1&iv_load_policy=3" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>
    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }
    </script>
</body>
</html>

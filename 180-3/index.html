<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самуи: Crystal Bay и Bangrak Beach</title>
    <style>
        /* Стили для гамбургер-меню */
        .hamburger {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            cursor: pointer;
            font-size: 28px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .hamburger:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
        }

        /* Контейнер для главной 180° камеры */
        .main-180 {
            position: relative;
            width: 100vw;
            height: 60vh;
            overflow: hidden;
        }

        .main-180 iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180%;
            height: 100%;
            transform: translate(-50%, -50%);
            border: none;
            aspect-ratio: 2/1;
        }

        /* Сетка для двух основных камер */
        .main-cams {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            height: calc(40vh - 40px);
        }

        .video-wrapper {
            position: relative;
            height: 100%;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .video-wrapper:hover {
            transform: scale(1.02);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .main-cams {
                grid-template-columns: 1fr;
                height: auto;
            }
            .main-180 {
                height: 50vh;
            }
            .hamburger {
                font-size: 24px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="hamburger">← Назад</a>

    <!-- 180° камера с принудительным соотношением -->
    <div class="main-180">
        <iframe src="https://www.youtube.com/embed/zK_BsJ2Z0Us?autoplay=1&mute=1&iv_load_policy=3&controls=0" 
                allowfullscreen>
        </iframe>
    </div>

    <!-- Основные камеры -->
    <div class="main-cams">
        <!-- Crystal Bay Beach -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/5FNI26lPfgE?autoplay=1&mute=1&iv_load_policy=3" 
                    allowfullscreen>
            </iframe>
        </div>

        <!-- Bangrak Beach -->
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/Fw9hgttWzIg?autoplay=1&mute=1&iv_load_policy=3" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>

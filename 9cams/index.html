<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 Cameras — Koh Samui Live</title>
    <style>
        /* ── Theme tokens ── */
        :root {
            --bg:        #000;
            --bg2:       #111;
            --bg-panel:  #1a1a1a;
            --bg-card:   #161616;
            --bd:        #1e1e1e;
            --bd2:       #2a2a2a;
            --t1:        #ddd;
            --t2:        #888;
            --t3:        #555;
            --t4:        #333;
            --ac:        #4fc;
            --overlay:   rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg:        #e8e8e8;
            --bg2:       #f5f5f5;
            --bg-panel:  #ffffff;
            --bg-card:   #ffffff;
            --bd:        #ddd;
            --bd2:       #ccc;
            --t1:        #1a1a1a;
            --t2:        #555;
            --t3:        #888;
            --t4:        #bbb;
            --ac:        #0d6efd;
            --overlay:   rgba(0,0,0,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; width: 100vw; height: 100vh; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            width: 100vw;
            height: 100vh;
        }
        .video-wrapper {
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* ── Hamburger ── */
        .hamburger {
            position: fixed;
            top: 14px; left: 14px;
            z-index: 1001;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.35);
            padding: 5px 9px;
            border-radius: 5px;
            opacity: 0.2;
            transition: opacity 0.3s;
            user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }

        /* ── Side menu ── */
        .menu-overlay {
            display: none; position: fixed; inset: 0;
            background: var(--overlay); z-index: 1002;
        }
        .side-menu {
            position: fixed; top: 0; left: 0;
            width: 260px; height: 100%;
            background: var(--bg-panel);
            border-right: 1px solid var(--bd);
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open  { transform: translateX(0); }
        .menu-overlay.open { display: block; }

        .menu-title {
            color: var(--t3); font-size: 10px;
            text-transform: uppercase; letter-spacing: 2px;
            padding: 0 20px 14px;
            border-bottom: 1px solid var(--bd);
            margin-bottom: 8px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .menu-item {
            display: block; color: var(--t2);
            text-decoration: none;
            padding: 13px 20px; font-size: 14px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item:hover { background: var(--bd); color: var(--t1); }
        .menu-item.active { color: var(--ac); border-left: 3px solid var(--ac); padding-left: 17px; }
        .menu-sep { border: none; border-top: 1px solid var(--bd); margin: 6px 0; }

        /* Theme toggle row */
        .menu-theme {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; cursor: pointer;
            transition: background 0.2s;
        }
        .menu-theme:hover { background: var(--bd); }
        .menu-theme span { color: var(--t2); font-size: 13px; font-family: 'Segoe UI', system-ui, sans-serif; }
        .theme-icon { font-size: 15px; }

        .menu-tip {
            margin-top: auto; padding: 14px 20px 8px;
            color: var(--t2); font-size: 11px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            border-top: 1px solid var(--bd); line-height: 1.55;
        }
        .menu-version {
            padding: 4px 20px 14px;
            color: var(--t2); font-size: 11px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            text-align: right;
        }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; overflow-y: auto; height: auto; min-height: 100vh; }
            .video-wrapper { padding-bottom: 56.25%; height: 0; }
        }
    </style>
</head>
<body>

    <div class="hamburger" id="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Navigation</div>
        <a href="/"        class="menu-item">🏠 &nbsp;Home</a>
        <a href="/9cams/"  class="menu-item active">⊞ &nbsp;9 Cameras</a>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Build a Camera View</a>
        <hr class="menu-sep">
        <div class="menu-theme" onclick="toggleTheme()">
            <span>Theme</span>
            <span class="theme-icon" id="themeIcon">☀</span>
        </div>
        <hr class="menu-sep">
        <div class="menu-tip">💡 Copy the page URL and paste into Wallpaper Engine</div>
        <div class="menu-version">v.1.016</div>
    </nav>

    <div class="grid-container">
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/3N3ZwIB_X4Y?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Fw9hgttWzIg?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Tpj0cmMVOd0?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/UJpFtzKug7M?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Kush_ZxTy2c?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/FBYUkqutqzE?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/x73IEW0fOo0?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/wP6hpWgPJ98?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Sm9y8G0TLXI?autoplay=1&mute=1&iv_load_policy=3" allowfullscreen></iframe></div>
    </div>

    <script>
        /* ── Theme ── */
        function initTheme() {
            const stored = localStorage.getItem('samui-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(stored || (prefersDark ? 'dark' : 'light'), false);
        }
        function applyTheme(t, save = true) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeIcon').textContent = t === 'dark' ? '☀' : '🌙';
            if (save) localStorage.setItem('samui-theme', t);
        }
        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(cur === 'dark' ? 'light' : 'dark');
        }
        initTheme();

        /* ── Nav menu ── */
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui — 2 Panoramic 180° Cameras</title>
    <style>
        .hamburger {
            position: fixed;
            top: 48px;
            left: 12px;
            z-index: 1001;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 4px 7px;
            border-radius: 4px;
            opacity: 0.2;
            transition: opacity 0.3s;
            user-select: none;
        }
        .hamburger:hover { opacity: 0.85; }
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
        }
        .side-menu {
            position: fixed;
            top: 0; left: 0;
            width: 270px;
            height: 100%;
            background: #1a1a1a;
            z-index: 1003;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        .menu-overlay.open { display: block; }
        .menu-title {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
            font-family: sans-serif;
        }
        .menu-item {
            display: block;
            color: #999;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 15px;
            font-family: sans-serif;
            transition: background 0.2s;
        }
        .menu-item:hover { background: #2a2a2a; }
        .menu-item.active { color: #4fc; border-left: 3px solid #4fc; }
        .menu-tip {
            margin-top: auto;
            padding: 15px 20px;
            color: #888;
            font-size: 12px;
            font-family: sans-serif;
            border-top: 1px solid #333;
            line-height: 1.5;
        }
        body {
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
        }

        /* Контейнер для 180° камеры с нестандартным соотношением */
        .main-180 {
            position: relative;
            width: 100vw;
            height: 50vh; /* Стартовая высота */
            margin: 0 -10px; /* Компенсация padding body */
            overflow: hidden;
        }

        .main-180 iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180%; /* Искажение ширины */
            height: 100%;
            transform: translate(-50%, -50%);
            border: none;
            aspect-ratio: 2/1; /* Форсируем соотношение 2:1 */
        }

        /* Сетка для обычных камер */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 1980px;
            margin: 0 auto;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            
            .main-180 {
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Navigation</div>
        <a href="/builder/" class="menu-item">🎨 &nbsp;Builder</a>
        <hr style="border:none;border-top:1px solid #222;margin:6px 0">
        <a href="/index.html" class="menu-item">⊞ &nbsp;9 Cameras (3×3)</a>
        <a href="/180-3/index.html" class="menu-item">▬ &nbsp;Panorama + 2 Cameras</a>
        <a href="/180-2/360.html" class="menu-item active">◫ &nbsp;2 Panoramic 180°</a>
        <div class="menu-tip">💡 Copy the page URL and paste into Wallpaper Engine</div>
    </nav>

    <!-- 180° камера с принудительным соотношением -->
    <div class="main-180">
        <iframe src="https://www.youtube.com/embed/NTTtqzL5OWI?autoplay=1&mute=1&iv_load_policy=3&controls=0"
                allowfullscreen>
        </iframe>
    </div>
    <div class="main-180">
        <iframe src="https://www.youtube.com/embed/LGNYKz4yziE?autoplay=1&mute=1&iv_load_policy=3&controls=0"
                allowfullscreen>
        </iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }
    </script>
</body>
</html>
